services:
  api:
    build: .
    container_name: promo-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  streamlit:
    image: python:3.11-slim
    container_name: promo-streamlit
    working_dir: /app
    command: >
      bash -c "
      pip install streamlit pandas requests plotly &&
      streamlit run app.py --server.port=8501 --server.address=0.0.0.0
      "
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      api:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
